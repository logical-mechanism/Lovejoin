# Lovejoin UI nginx site.
#
# Serves the Vite-built SPA from /usr/share/nginx/html with the rules
# the SPA needs: React Router catch-all to /index.html, immutable cache
# on hashed assets, no-cache on the entry HTML so deploys roll out on
# the next page load.
#
# This file is processed by nginx:alpine's envsubst entrypoint at
# container start (it lives at /etc/nginx/templates/default.conf.template
# in the image). The only variable expanded is ${PORT}; ${dollar} keeps
# nginx's own $-vars literal so envsubst doesn't mangle them.

server {
    listen ${PORT};
    listen [::]:${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip the bulky JS/CSS/font payloads vite emits. brotli would be
    # better but isn't compiled into the stock nginx:alpine image.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        application/javascript
        application/json
        application/wasm
        application/xml
        font/woff
        font/woff2
        image/svg+xml
        text/css
        text/plain
        text/xml;
    gzip_vary on;

    # Hashed asset bundles — vite emits content-addressed filenames
    # under /assets/. Cache them aggressively; a content change yields
    # a new filename, so the cache never serves stale code.
    location /assets/ {
        access_log off;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Wasm + workers loaded at runtime by mesh's @sidan-lab/sidan-csl-rs-browser.
    # Let the browser cache them for a day; they don't get content-addressed
    # filenames the way vite's chunks do, so the long TTL above would hold
    # an outdated wasm across deploys.
    location ~* \.(wasm|worker\.js)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400";
    }

    # Static fonts under /assets covered above; anything else with a
    # well-known extension gets a sane medium-term cache.
    location ~* \.(?:woff2?|ttf|otf|png|jpg|jpeg|gif|webp|svg|ico)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # SPA catch-all. React Router uses client-side routing — every URL
    # under the app must serve index.html. try_files keeps direct hits
    # on real files (e.g. /robots.txt) working.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Privacy + security headers. The CSP is intentionally permissive
    # for now — mesh's bundle pulls in inline scripts via top-level
    # await glue and a Wasm runtime. Tightening this is a follow-up
    # (see docs/spec/06-ui.md §"Privacy UX rules").
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Frame-Options "DENY" always;

    # No access logs by default — privacy spec rule "Backend logs IPs
    # only for rate limiting, retention < 24h" — and the UI nginx
    # doesn't rate-limit, so it has no business logging IPs at all.
    # DO App Platform still captures stderr from upstream errors.
    access_log off;
    error_log /dev/stderr warn;
}
