name: Release (on merge to main)

# Ships per-merge artifacts. M7 spec (docs/spec/09-milestones.md):
#   "On merge to main: publishes SDK to npm under `dev` tag;
#    builds + pushes backend Docker image; uploads UI bundle."
#
# Three independent jobs — one published artifact each — plus a
# preflight that checks which credentials are available so forks /
# new clones can merge without the workflow turning red.
#
# Required secrets (all repo-level, optional individually):
#   NPM_TOKEN    npm automation token with publish access to @lovejoin/sdk.
#                When absent, npm-sdk job is skipped.
#   GITHUB_TOKEN provided automatically by GitHub Actions; used by
#                docker-backend to push to ghcr.io/<owner>/lovejoin-backend.
#
# UI bundle is uploaded as a workflow artifact (no extra secrets needed),
# downloadable from the Actions tab for manual hosting / smoke testing.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Default least-privilege scope for the workflow. Jobs that need to
# publish (`npm-sdk`, `docker-backend`) opt up explicitly via their own
# `permissions:` blocks. Without this top-level default the repo-level
# `default_workflow_permissions: write` gives every job a write-scoped
# GITHUB_TOKEN — overkill for `preflight` and `ui-bundle`, which only
# need to clone the repo (security review v1, CI finding).
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Preflight (secret presence)
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      have_npm: ${{ steps.check.outputs.have_npm }}
    steps:
      - id: check
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ -n "$NPM_TOKEN" ]]; then
            echo "have_npm=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_npm=false" >> "$GITHUB_OUTPUT"
            echo "::notice::NPM_TOKEN not set — npm-sdk publish will be skipped."
          fi

  npm-sdk:
    name: Publish @lovejoin/sdk (dev tag)
    needs: preflight
    if: needs.preflight.outputs.have_npm == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      # Version single-sourced from `package.json:packageManager`.
      # Specifying `version:` here would conflict (action errors with
      # "Multiple versions of pnpm specified" — see ERR_PNPM_BAD_PM_VERSION).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --filter @lovejoin/sdk run build

      # Mint a unique pre-release version for each merge so `dev` always
      # points to the latest main without polluting the stable tag. The base
      # version is read from offchain/package.json so version bumps don't
      # require touching this workflow. Format: <base>-dev.<unix-ts>.<sha>.
      - name: Stamp dev version
        working-directory: offchain
        run: |
          base=$(node -p "require('./package.json').version")
          ts=$(date -u +%s)
          sha=$(git rev-parse --short HEAD)
          version="${base}-dev.${ts}.${sha}"
          npm version --no-git-tag-version "$version"
          echo "Stamped @lovejoin/sdk@$version"

      - name: Publish to npm under dev tag
        working-directory: offchain
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --tag dev --access public --provenance

  docker-backend:
    name: Build + push backend Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        id: img
        run: |
          name="ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/lovejoin-backend"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:dev
            ${{ steps.img.outputs.name }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ui-bundle:
    name: Build UI bundle (release artifact)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # Version single-sourced from `package.json:packageManager`.
      # Specifying `version:` here would conflict (action errors with
      # "Multiple versions of pnpm specified" — see ERR_PNPM_BAD_PM_VERSION).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build SDK (UI imports @lovejoin/sdk from dist)
        run: pnpm --filter @lovejoin/sdk run build

      - name: Build UI
        run: pnpm --filter @lovejoin/ui run build

      - name: Upload ui-bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-bundle-${{ github.sha }}
          path: ui/dist
          if-no-files-found: error
          retention-days: 30
