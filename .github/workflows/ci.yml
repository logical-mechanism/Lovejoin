name: CI

# Fast PR + main suite. M7 spec (docs/spec/09-milestones.md):
#   "Builds all packages. Unit + validator + property tests on every PR."
#
# Chain-touching checks (Preprod integration suite, 30-min fuzz harness)
# are operator-run today, not on a cron — automating them in GitHub
# Actions would require putting a funded Preprod wallet's key into repo
# secrets, and the risk/reward is wrong while the project is one
# maintainer + infrequent merges. They'll come back as a manual
# workflow_dispatch pre-release gate (run from a self-hosted runner)
# when M4.5 tags a real version. release.yml handles SDK / Docker /
# UI-bundle shipping on merges to main.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Aiken (lint + test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Aiken 1.1.21
        uses: aiken-lang/setup-aiken@v1.0.3
        with:
          version: v1.1.21

      - name: aiken --version
        run: aiken --version

      - name: aiken fmt --check
        working-directory: contracts
        run: aiken fmt --check

      - name: aiken check
        working-directory: contracts
        run: aiken check

  lint:
    name: TS (eslint + prettier + tsc)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # The UI imports @lovejoin/sdk which resolves to offchain/dist/. On
      # a clean checkout that doesn't exist yet, so build the SDK before
      # linting consumers — otherwise UI's tsc step fails with TS2307.
      - name: Build SDK (for downstream tsc resolution)
        run: pnpm --filter @lovejoin/sdk run build

      # `pnpm lint` runs tsc + eslint per workspace, then prettier --check
      # once across the repo.
      - name: Lint (tsc + eslint + prettier)
        run: pnpm lint

  ts:
    name: TS (build + test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      # Version single-sourced from `package.json:packageManager`.
      # Specifying `version:` here would conflict (action errors with
      # "Multiple versions of pnpm specified" — see ERR_PNPM_BAD_PM_VERSION).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # The UI imports @lovejoin/sdk which resolves to offchain/dist/. On a
      # clean checkout that doesn't exist yet, so build the SDK before
      # linting consumers — otherwise UI's tsc fails with TS2307.
      - name: Build SDK (for downstream lint resolution)
        run: pnpm --filter @lovejoin/sdk run build

      - name: Build
        run: pnpm -r --filter ./offchain --filter ./backend --filter ./ui run build

      - name: Test (unit + property)
        run: pnpm -r --filter ./offchain --filter ./backend --filter ./ui run test

  rust:
    name: Rust ref impl (cargo test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crypto/ref

      - name: cargo test --release
        working-directory: crypto/ref
        run: cargo test --release

  reproducibility:
    name: Reproducible-build verification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Aiken 1.1.21
        uses: aiken-lang/setup-aiken@v1.0.3
        with:
          version: v1.1.21

      - name: scripts/check-reproducibility.sh
        run: ./scripts/check-reproducibility.sh

  coverage:
    name: TS coverage (v8 lcov artifact)
    # Soft target: 70% lines on offchain/src/crypto/. Numbers are tracked
    # in docs/test-coverage.md. We do not enforce a vitest threshold here
    # — per CLAUDE.md "no third-party telemetry", we never wired Codecov,
    # so the lcov artifact is the audit trail. Failing CI on a coverage
    # dip would punish unrelated PRs; the doc + artifact is the contract.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build SDK (for downstream resolution)
        run: pnpm --filter @lovejoin/sdk run build

      # `pnpm --filter X test --coverage` forwards `--coverage` to vitest;
      # `pnpm --filter X run test -- --coverage` does NOT in pnpm 10 (the
      # `--` form swallows the flag silently and produces no lcov, which
      # then fails actions/upload-artifact's if-no-files-found gate). Use
      # the implicit-script shorthand.
      - name: Coverage — offchain
        run: pnpm --filter @lovejoin/sdk test --coverage

      - name: Coverage — backend
        run: pnpm --filter @lovejoin/backend test --coverage

      - name: Coverage — ui
        run: pnpm --filter @lovejoin/ui test --coverage

      - name: Upload lcov reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: |
            offchain/coverage/lcov.info
            backend/coverage/lcov.info
            ui/coverage/lcov.info
          if-no-files-found: error
          retention-days: 30
