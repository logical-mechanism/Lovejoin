# DigitalOcean App Platform spec — Preprod alpha deployment.
#
# Single app, two services on one shared domain:
#   • backend  → /api/*  (path-stripped to / before forwarding to Fastify)
#   • ui       → /*      (nginx serving the Vite static bundle)
#
# Route stripping means the Fastify routes stay at their canonical
# top-level paths (/health, /pool, /params, etc.) — see
# backend/src/api/server.ts; the /api prefix exists only in DO routing.
#
# Apply with:   doctl apps create --spec .do/app.yaml
# Update with:  doctl apps update <app-id> --spec .do/app.yaml
#
# Auto-deploy on push to main is enabled at the github source level. To
# deploy a different branch, change `branch` here and re-apply.
#
# Schema reference: https://docs.digitalocean.com/products/app-platform/reference/app-spec/

name: lovejoin-preprod

# Region close to most users. lon = London, can be changed; full list:
# https://docs.digitalocean.com/products/platform/availability-matrix/
region: nyc

# Domain config left empty so the app spawns at the auto-assigned
# ondigitalocean.app subdomain on first apply. Add a custom domain in
# the DO dashboard or extend this section once DNS is decided.
# domains:
#   - domain: lovejoin.example
#     type: PRIMARY

services:
  # ------------------------------------------------------------------
  # Backend (Fastify indexer + REST API).
  # ------------------------------------------------------------------
  - name: backend
    github:
      repo: logical-mechanism/Lovejoin
      branch: main
      deploy_on_push: true

    dockerfile_path: backend/Dockerfile
    source_dir: /
    # NETWORK build-arg picks artifacts/<network>/addresses.json. Bump
    # to mainnet only after the audit gate (docs/spec/11-open-questions.md
    # OQ-Y).
    build_args:
      - key: NETWORK
        value: preprod

    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 3001

    # Path that DO probes for liveness. Fastify's /health returns 503
    # only when the indexer runtime has a fatal error (a restart can
    # actually help) — DO's default behaviour treats 200–399 as
    # healthy, anything else as a failure. After 3 consecutive failures
    # DO restarts the container.
    health_check:
      http_path: /health
      initial_delay_seconds: 60
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

    # DO routing: /api/* hits the backend; the /api prefix is stripped
    # by default before forwarding to the service. So /api/health on
    # the public URL → /health inside the container.
    routes:
      - path: /api

    envs:
      # Static (plaintext) — fine to commit values via the spec.
      - key: NETWORK
        scope: RUN_TIME
        value: preprod
      - key: PORT
        scope: RUN_TIME
        value: "3001"
      - key: HOST
        scope: RUN_TIME
        value: 0.0.0.0
      - key: ADDRESSES_PATH
        scope: RUN_TIME
        # Matches the COPY in backend/Dockerfile.
        value: /srv/lovejoin/addresses.json
      - key: RATE_LIMIT_PER_MIN
        scope: RUN_TIME
        value: "600"
      # CORS allowlist. ${APP_URL} expands at deploy time to the
      # service's full public URL (https://lovejoin-preprod.ondigitalocean.app
      # by default). If you add a custom domain, append it here as a
      # comma-separated list.
      - key: CORS_ORIGINS
        scope: RUN_TIME
        value: ${APP_URL}

      # External Cardano infrastructure — DO can't run a node. Pattern
      # we use for the Preprod alpha: home-hosted Ogmios + db-sync
      # bridged via Cloudflare Tunnel + Cloudflare Access service
      # tokens. See docs/deploy.md §"Connecting App Platform to
      # home-hosted infrastructure" for the home-side setup.
      #
      # When CF_TUNNEL_*_HOSTNAME below is set, the container runs
      # `cloudflared access tcp` as a sidecar that exposes the remote
      # service on 127.0.0.1, so OGMIOS_URL + DBSYNC_URL point at
      # loopback. To bypass the tunnel (managed Ogmios at Demeter,
      # direct postgres URL, etc.), unset CF_TUNNEL_*_HOSTNAME and
      # set OGMIOS_URL / DBSYNC_URL to the directly-reachable URL.
      #
      # All SECRET values below are placeholders. Set real values once
      # in the DO dashboard after the first deploy; DO preserves
      # dashboard-set SECRET values across `doctl apps update --spec`
      # calls (see docs/deploy.md §"Secrets handling").
      - key: OGMIOS_URL
        scope: RUN_TIME
        # Loopback by default — the cloudflared sidecar opens the
        # listener at 127.0.0.1:1337 once CF_TUNNEL_OGMIOS_HOSTNAME
        # is set. Override to a public URL (Demeter / DRI) to skip
        # the tunnel.
        value: ws://127.0.0.1:1337

      # When CF_TUNNEL_DBSYNC_HOSTNAME is unset and DBSYNC_URL is
      # blank, the address-keyed routes 503 and the SDK + UI fall
      # back to BlockfrostProvider for /utxos + /tx. With the tunnel
      # in place set this to postgres://USER:PASS@127.0.0.1:5432/DBNAME.
      - key: DBSYNC_URL
        scope: RUN_TIME
        type: SECRET
        value: ""

      # Cloudflare Tunnel sidecar config — operator fills these in
      # after creating the home-side tunnel + Access applications.
      # Hostnames are not strictly secret but live in DO so they can
      # be edited without a redeploy of the spec.
      - key: CF_TUNNEL_OGMIOS_HOSTNAME
        scope: RUN_TIME
        value: ""
      - key: CF_TUNNEL_DBSYNC_HOSTNAME
        scope: RUN_TIME
        value: ""
      - key: CF_TUNNEL_SERVICE_TOKEN_ID
        scope: RUN_TIME
        type: SECRET
        value: ""
      - key: CF_TUNNEL_SERVICE_TOKEN_SECRET
        scope: RUN_TIME
        type: SECRET
        value: ""

      # Optional Blockfrost fallback for /history when db-sync is
      # absent or briefly down. Suffix-match keeps a single .env in
      # sync with the SDK's BLOCKFROST_PROJECT_ID_<NETWORK> convention.
      - key: BLOCKFROST_PROJECT_ID_PREPROD
        scope: RUN_TIME
        type: SECRET
        value: ""

  # ------------------------------------------------------------------
  # UI (nginx serving the Vite static bundle).
  # ------------------------------------------------------------------
  - name: ui
    github:
      repo: logical-mechanism/Lovejoin
      branch: main
      deploy_on_push: true

    dockerfile_path: ui/Dockerfile
    source_dir: /

    # Vite reads VITE_* at *build* time (it's a static SPA — env vars
    # become string literals in the bundle). Both build_args and the
    # BUILD_TIME-scoped envs below are passed to `docker build`; we
    # use envs so DO's secret type can mask the Blockfrost project id.
    build_args:
      - key: VITE_NETWORK
        value: preprod

    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 8080

    # nginx serves /index.html on /, so / is a valid health probe.
    health_check:
      http_path: /
      initial_delay_seconds: 30
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

    # Catch-all for the public domain. Order matters: more specific
    # routes win, so backend's /api beats ui's /.
    routes:
      - path: /

    envs:
      # ${APP_URL}/api lets the UI call the same hostname it was
      # served from — no CORS, no extra DNS, no rewrite required. The
      # backend's /api prefix is stripped by DO before it reaches
      # Fastify.
      - key: VITE_BACKEND_URL
        scope: BUILD_TIME
        value: ${APP_URL}/api

      # Build-time fallback for direct Blockfrost queries when the
      # backend's /history is unavailable. SECRET so the value is
      # masked in the spec's audit log; still ends up baked into the
      # static bundle (see docs/deploy.md §"UI build-time secrets").
      - key: VITE_BLOCKFROST_PROJECT_ID
        scope: BUILD_TIME
        type: SECRET
        value: ""

      # Optional override for the collateral-provider host. The SDK
      # ships a sensible per-network default (offchain/src/tx/known-collateral-hosts.ts);
      # leave empty to use it.
      - key: VITE_COLLATERAL_ENDPOINT
        scope: BUILD_TIME
        value: ""
