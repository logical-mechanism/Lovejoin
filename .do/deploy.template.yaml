# DigitalOcean App Platform spec — *template* with placeholders.
#
# Copy to app.yaml (or app.<network>.yaml) and replace every <PLACEHOLDER>
# before applying. The committed .do/app.yaml is the live Preprod spec;
# this template exists for contributors spinning up their own copy or
# adding a mainnet variant after the audit gate.
#
# Apply with:   doctl apps create --spec .do/app.<network>.yaml
# Diff with:    doctl apps spec get <app-id> | diff - .do/app.<network>.yaml

name: <APP_NAME>            # e.g. lovejoin-preprod, lovejoin-mainnet

region: <DO_REGION>          # e.g. nyc, sfo3, lon1

# domains:
#   - domain: <CUSTOM_DOMAIN>
#     type: PRIMARY

services:
  - name: backend
    github:
      repo: <GITHUB_OWNER>/<GITHUB_REPO>
      branch: <GIT_BRANCH>
      deploy_on_push: true

    dockerfile_path: backend/Dockerfile
    source_dir: /

    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 3001

    health_check:
      http_path: /health
      initial_delay_seconds: 60
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

    routes:
      - path: /api

    envs:
      # NETWORK does double duty: a Dockerfile ARG (selects
      # artifacts/<NETWORK>/addresses.json) AND a runtime env. The
      # RUN_AND_BUILD_TIME scope passes it to both stages.
      - key: NETWORK
        scope: RUN_AND_BUILD_TIME
        value: <NETWORK>
      - key: PORT
        scope: RUN_TIME
        value: "3001"
      - key: HOST
        scope: RUN_TIME
        value: 0.0.0.0
      - key: ADDRESSES_PATH
        scope: RUN_TIME
        value: /srv/lovejoin/addresses.json
      - key: RATE_LIMIT_PER_MIN
        scope: RUN_TIME
        value: "600"
      - key: CORS_ORIGINS
        scope: RUN_TIME
        value: ${APP_URL}
      # CF Tunnel sidecar pattern: leave OGMIOS_URL on loopback and
      # set CF_TUNNEL_OGMIOS_HOSTNAME below. To skip the tunnel,
      # replace with a public URL (e.g. wss://ogmios.demeter.run/<token>).
      - key: OGMIOS_URL
        scope: RUN_TIME
        value: ws://127.0.0.1:1337
      - key: DBSYNC_URL
        scope: RUN_TIME
        type: SECRET
        value: <POSTGRES_DBSYNC_URL>       # postgres://USER:PASS@127.0.0.1:5432/DBNAME (with CF tunnel)
                                           #   or "" to disable address-keyed routes
      - key: CF_TUNNEL_OGMIOS_HOSTNAME
        scope: RUN_TIME
        value: <OGMIOS_HOSTNAME>           # e.g. ogmios-preprod.example.com; "" to skip
      - key: CF_TUNNEL_DBSYNC_HOSTNAME
        scope: RUN_TIME
        value: <DBSYNC_HOSTNAME>           # e.g. dbsync-preprod.example.com; "" to skip
      - key: CF_TUNNEL_SERVICE_TOKEN_ID
        scope: RUN_TIME
        type: SECRET
        value: <CF_ACCESS_SERVICE_TOKEN_ID>
      - key: CF_TUNNEL_SERVICE_TOKEN_SECRET
        scope: RUN_TIME
        type: SECRET
        value: <CF_ACCESS_SERVICE_TOKEN_SECRET>
      - key: BLOCKFROST_PROJECT_ID_<NETWORK_UPPER>
        scope: RUN_TIME
        type: SECRET
        value: <BLOCKFROST_PROJECT_ID>     # "" to disable history fallback

  - name: ui
    github:
      repo: <GITHUB_OWNER>/<GITHUB_REPO>
      branch: <GIT_BRANCH>
      deploy_on_push: true

    dockerfile_path: ui/Dockerfile
    source_dir: /

    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 8080

    health_check:
      http_path: /
      initial_delay_seconds: 30
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

    routes:
      - path: /

    envs:
      - key: VITE_NETWORK
        scope: BUILD_TIME
        value: <NETWORK>
      - key: VITE_BACKEND_URL
        scope: BUILD_TIME
        value: ${APP_URL}/api
      - key: VITE_BLOCKFROST_PROJECT_ID
        scope: BUILD_TIME
        type: SECRET
        value: <BLOCKFROST_PROJECT_ID>
      - key: VITE_COLLATERAL_ENDPOINT
        scope: BUILD_TIME
        value: ""                          # "" → SDK's per-network default
